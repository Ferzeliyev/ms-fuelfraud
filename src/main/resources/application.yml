spring:
  application:
    name: ms-fuelfraud
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8090}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
fuelfraud:
  noise-tolerance: 0.5
  histogram-bin-count: 0
  min-gap-fraction: 0.2
  min-threshold: 1.0
  max-threshold: 100.0
  median-size: 5
  window-size: 5
  stability-window-size: 15
  start-sensitivity-sigma: 3.0
  stability-sigma: 2.0
